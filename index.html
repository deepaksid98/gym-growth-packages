<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{gym_name}} | Official Site</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="container">
      <h1>{{gym_name}}</h1>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <h2>Start Your Transformation Journey Today</h2>
      <p>Join the best fitness center in {{city}} and achieve your goals with expert guidance.</p>
      <a href="https://wa.me/{{whatsapp_number}}?text=I%20want%20to%20join" target="_blank" rel="noopener" class="btn">Message Us to Join</a>
    </div>
  </section>

  <section class="info">
    <div class="container">
      <h3>Contact & Location</h3>
      <p style="margin-bottom: 20px; font-size: 1.1rem;">📞 Phone: <strong>{{phone_number}}</strong></p>
      
      <!-- Replace with actual iframe -->
      <div class="map-container">
        {{google_maps_embed}}
        <div style="padding: 130px 0; color: #888;">[Google Map Goes Here]</div>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; 2026 {{gym_name}}. All rights reserved.</p>
    </div>
  </footer>

  <!-- Floating WhatsApp -->
  <a class="wa-float" href="https://wa.me/{{whatsapp_number}}?text=I%20want%20to%20join" target="_blank" rel="noopener" aria-label="WhatsApp">
