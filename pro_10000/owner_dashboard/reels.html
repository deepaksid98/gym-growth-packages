<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reel Scripts — Gym Growth System Pro</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { padding-top: 60px; }
    .page-wrap { padding: 32px 0 80px; }
    .reels-header { margin-bottom: 40px; }
    .filter-bar { display:flex;gap:8px;flex-wrap:wrap;margin-top:20px; }
    .filter-btn { padding:7px 16px;border-radius:20px;font-size:.8rem;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--gray2);cursor:pointer;transition:all .2s; }
    .filter-btn.active, .filter-btn:hover { background:rgba(229,57,53,.12);border-color:rgba(229,57,53,.4);color:var(--red); }

    .reels-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:32px; }

    .reel-card {
      background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);
      overflow:hidden;display:flex;flex-direction:column;
      transition:border-color .2s,transform .2s;
    }
    .reel-card:hover { border-color:rgba(229,57,53,.4);transform:translateY(-3px); }

    /* Phone mockup */
    .reel-preview {
      background:#000;aspect-ratio:9/16;max-height:280px;position:relative;
      display:flex;flex-direction:column;justify-content:space-between;
      padding:20px 16px;overflow:hidden;
    }
    .reel-bg { position:absolute;inset:0;opacity:.3; }
    .reel-number { position:absolute;top:12px;left:12px;background:rgba(0,0,0,.6);color:#fff;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px; }
    .reel-type-tag { position:absolute;top:12px;right:12px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700; }
    .type-hook   { background:rgba(229,57,53,.8);color:#fff; }
    .type-head   { background:rgba(66,165,245,.8);color:#fff; }
    .type-trans  { background:rgba(156,204,101,.7);color:#111; }

    .reel-hook {
      position:relative;z-index:1;
      font-family:var(--font-h);font-size:1.3rem;font-weight:900;line-height:1.2;
      color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);
      text-align:center;margin:auto;
    }
    .reel-cta {
      position:relative;z-index:1;
      background:rgba(229,57,53,.9);color:#fff;
      border-radius:6px;padding:8px 16px;font-family:var(--font-h);font-size:.82rem;font-weight:700;
      text-align:center;
    }
    .reel-timer { position:absolute;bottom:0;left:0;height:3px;background:var(--red);animation:timer-anim 3s linear infinite; }
    @keyframes timer-anim { from{width:0} to{width:100%} }

    .reel-body { padding:20px; display:flex;flex-direction:column;gap:12px;flex:1; }
    .reel-title { font-family:var(--font-h);font-size:1rem;font-weight:700; }
    .reel-script { display:flex;flex-direction:column;gap:8px; }
    .script-step { display:flex;gap:10px;align-items:flex-start; }
    .script-time { font-size:.68rem;font-weight:700;color:var(--red);background:rgba(229,57,53,.1);border-radius:4px;padding:2px 6px;flex-shrink:0;font-family:monospace;margin-top:2px; }
    .script-text { font-size:.85rem;color:var(--gray1); }
    .script-text strong { color:var(--white); }
    .reel-tags { display:flex;gap:6px;flex-wrap:wrap; }
    .reel-tag { font-size:.7rem;padding:3px 10px;border-radius:20px;background:var(--bg2);border:1px solid var(--border2);color:var(--gray2); }
    .reel-actions { display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--border2);margin-top:auto; }
    .reel-actions button { flex:1; }

    /* HOOKS BANK */
    .hooks-section { background:var(--bg2);border-radius:var(--radius-lg);padding:32px;margin-top:48px; }
    .hooks-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:20px; }
    .hook-chip {
      background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
      padding:14px 16px;font-family:var(--font-h);font-size:.9rem;font-weight:600;
      cursor:pointer;transition:all .2s;text-align:center;
    }
    .hook-chip:hover { border-color:var(--red);color:var(--red);background:rgba(229,57,53,.05); }

    @media(max-width:768px) {
      .reels-grid { grid-template-columns:1fr; }
      .hooks-grid  { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
<nav class="sys-nav">
  <div class="sys-nav-inner">
    <div class="sys-nav-logo">Gym<span>Growth</span>Pro</div>
    <div class="sys-nav-links">
      <a href="index.html">🏠 <span>Dashboard</span></a>
      <a href="tracker.html">📊 <span>Tracker</span></a>
      <a href="reels.html" class="active">🎬 <span>Reels</span></a>
      <a href="whatsapp.html">💬 <span>WhatsApp</span></a>
    </div>
    <div class="sys-nav-badge">PRO</div>
  </div>
</nav>

<div class="wrap page-wrap">
  <div class="reels-header">
    <span class="sec-label">Module 3 — Content System</span>
    <h1 style="font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;">10 Reel Scripts 🎬</h1>
    <p style="max-width:600px;margin-top:10px;">Ready-to-shoot short-form content templates (7–15s). Copy the script, film, post — done.</p>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterReels('all',this)">All (10)</button>
      <button class="filter-btn" onclick="filterReels('hook',this)">📱 Text Hook</button>
      <button class="filter-btn" onclick="filterReels('head',this)">🎤 Talking Head</button>
      <button class="filter-btn" onclick="filterReels('trans',this)">✨ Transformation</button>
    </div>
  </div>

  <div class="reels-grid" id="reels-grid"></div>

  <!-- HOOKS BANK -->
  <div class="hooks-section">
    <span class="sec-label">Hooks Bank</span>
    <h2 style="font-size:1.4rem;font-weight:800;">Proven Opening Lines</h2>
    <p style="margin-top:6px;font-size:.9rem">Click any hook to copy it instantly</p>
    <div class="hooks-grid" id="hooks-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const REELS = [
  {
    id: 1, type: 'hook', title: 'The Problem Opener',
    hook: 'No results after months?', cta: 'DM "FIT" now',
    bg: 'linear-gradient(160deg,#1a0000,#2d0000)',
    duration: '7s',
    script: [
      { time: '0-2s', text: 'TEXT on screen: <strong>"No results after months?"</strong> — bold, red, center' },
      { time: '3-6s', text: 'Gym clip: client lifting weights, trainer guiding form' },
      { time: '6-7s', text: 'TEXT: <strong>"DM \'FIT\' to start your 90-day transformation"</strong>' },
    ],
    tags: ['#gymtransformation','#fitnessmotivation','#weightloss']
  },
  {
    id: 2, type: 'hook', title: 'The Mistake Hook',
    hook: "You're doing this wrong", cta: 'Follow for daily tips',
    bg: 'linear-gradient(160deg,#000d1a,#001a33)',
    duration: '10s',
    script: [
      { time: '0-2s', text: 'TEXT: <strong>"You\'re doing this wrong"</strong> — flash on screen' },
      { time: '3-8s', text: 'Show: wrong exercise form → correct exercise form side by side' },
      { time: '9-10s', text: 'TEXT: <strong>"Save this. Your gains depend on it."</strong>' },
    ],
    tags: ['#gymtips','#fitnesstips','#workouterrors']
  },
  {
    id: 3, type: 'hook', title: 'Fix Your Workout',
    hook: 'Fix your workout today', cta: 'Join today',
    bg: 'linear-gradient(160deg,#0d1a00,#1a2a00)',
    duration: '12s',
    script: [
      { time: '0-2s', text: 'TEXT: <strong>"Fix your workout today"</strong>' },
      { time: '3-10s', text: '3 quick tips shown as text overlays on gym clips:<br/>1. Progressive overload<br/>2. Rest 60s between sets<br/>3. Eat protein within 30 min' },
      { time: '11-12s', text: 'TEXT + Logo: <strong>"Join [Gym Name] — DM us"</strong>' },
    ],
    tags: ['#workoutadvice','#gymlife','#fitness']
  },
  {
    id: 4, type: 'hook', title: 'Stop Wasting Time',
    hook: 'Stop wasting time in gym', cta: 'Message now',
    bg: 'linear-gradient(160deg,#1a0a00,#2d1500)',
    duration: '15s',
    script: [
      { time: '0-2s', text: 'TEXT: <strong>"Stop wasting time in the gym"</strong>' },
      { time: '3-12s', text: 'Quick cuts: person doing random exercises → trainer with a structured plan → transformation result' },
      { time: '13-15s', text: 'TEXT: <strong>"Get a real plan. Message us now."</strong>' },
    ],
    tags: ['#personaltrainer','#gymplan','#results']
  },
  {
    id: 5, type: 'talking_head', title: 'Trainer Value Drop',
    hook: '1 thing that changed everything', cta: 'DM "FIT"',
    bg: 'linear-gradient(160deg,#0a0a1a,#10102d)',
    duration: '10s',
    script: [
      { time: '0-1s', text: 'Face camera: <strong>"One thing that changed my clients\' results..."</strong>' },
      { time: '2-8s', text: 'Speak directly: <strong>"Tracking their weight every week. Not guessing — knowing."</strong><br/>Show phone/sheet behind you.' },
      { time: '9-10s', text: 'Point to camera: <strong>"DM \'FIT\' — I\'ll track yours too."</strong>' },
    ],
    tags: ['#trainer','#fitnessmindset','#gymcoach']
  },
  {
    id: 6, type: 'talking_head', title: 'Why You\'re Not Growing',
    hook: "This is why you're not growing", cta: 'DM "FIT"',
    bg: 'linear-gradient(160deg,#1a0000,#0d0000)',
    duration: '12s',
    script: [
      { time: '0-2s', text: 'Face camera, direct: <strong>"This is why you\'re NOT growing."</strong>' },
      { time: '3-10s', text: 'List 3 reasons confidently:<br/><strong>1. No structured plan<br/>2. Wrong diet<br/>3. No accountability</strong>' },
      { time: '11-12s', text: '<strong>"We fix all 3. DM \'FIT\' now."</strong>' },
    ],
    tags: ['#muscleguide','#gymcoach','#fitnessgrowth']
  },
  {
    id: 7, type: 'talking_head', title: 'Client Win Story',
    hook: 'My client lost 18 kg — here\'s how', cta: 'Join today',
    bg: 'linear-gradient(160deg,#001a0d,#002211)',
    duration: '15s',
    script: [
      { time: '0-2s', text: '<strong>"My client lost 18 kg in 90 days."</strong>' },
      { time: '3-12s', text: 'Describe briefly:<br/>- What they were doing before<br/>- What we changed (diet + training)<br/>- What happened' },
      { time: '13-15s', text: '<strong>"Want the same? Join today — DM me."</strong>' },
    ],
    tags: ['#clientresults','#transformation90days','#gymwin']
  },
  {
    id: 8, type: 'transformation', title: 'Before → After Reveal',
    hook: '90 days. Same person.', cta: 'Start your journey',
    bg: 'linear-gradient(160deg,#0d0000,#1a0000)',
    duration: '10s',
    script: [
      { time: '0-3s', text: 'BEFORE photo/clip with TEXT overlay: <strong>"Day 1"</strong>' },
      { time: '4-8s', text: 'AFTER photo/clip with dramatic transition. TEXT: <strong>"Day 90 — -18 kg"</strong>' },
      { time: '9-10s', text: 'Gym logo + TEXT: <strong>"Your turn. DM \'FIT\'."</strong>' },
    ],
    tags: ['#before_after','#bodytransformation','#90daychallenge']
  },
  {
    id: 9, type: 'transformation', title: 'Week-by-Week Progress',
    hook: 'Watch this person transform', cta: 'Start your 90 days',
    bg: 'linear-gradient(160deg,#000a1a,#00061a)',
    duration: '15s',
    script: [
      { time: '0-2s', text: 'TEXT: <strong>"Week 1 → Week 12. Watch."</strong>' },
      { time: '3-12s', text: 'Quick cuts every 3 seconds:<br/>Wk 1 → Wk 4 → Wk 8 → Wk 12<br/>Each clip with weight text overlay' },
      { time: '13-15s', text: '<strong>"This is what we do at [Gym Name]. Join us."</strong>' },
    ],
    tags: ['#weeklycheck','#progresspics','#gymjourney']
  },
  {
    id: 10, type: 'hook', title: 'The Offer Reel',
    hook: 'Join this month. Get this free.', cta: 'Limited slots',
    bg: 'linear-gradient(160deg,#1a0a00,#2d1500)',
    duration: '12s',
    script: [
      { time: '0-2s', text: 'TEXT flash: <strong>"Joining this month?"</strong>' },
      { time: '3-10s', text: 'List what\'s included:<br/>✓ Personal training plan<br/>✓ Custom diet plan<br/>✓ Weekly tracking<br/>✓ WhatsApp support' },
      { time: '11-12s', text: '<strong>"Limited slots. Message NOW."</strong>' },
    ],
    tags: ['#gymoffer','#jointoday','#fitnessgoals']
  }
];

const HOOKS = [
  "No results after months?",
  "You're doing this wrong",
  "Fix your workout today",
  "Stop wasting time in gym",
  "This is why you're not growing",
  "My client lost 18 kg — here's how",
  "The #1 mistake gym beginners make",
  "Watch this transformation in 10s",
  "Your trainer won't tell you this",
  "Why 90% of gym goers fail"
];

const typeLabels = { hook: 'Text Hook', head: 'Talking Head', trans: 'Transformation' };
const typeCss = { hook: 'type-hook', head: 'type-head', trans: 'type-trans' };
const typeBg = {
  hook: 'linear-gradient(160deg,#1a0000,#2d0000)',
  head: 'linear-gradient(160deg,#000d1a,#001a33)',
  trans: 'linear-gradient(160deg,#001a0d,#002211)'
};

function renderReels(filter) {
  const grid = document.getElementById('reels-grid');
  const filtered = filter === 'all' ? REELS : REELS.filter(r => r.type === filter || (filter === 'trans' && r.type === 'transformation') || (filter === 'head' && r.type === 'talking_head'));
  const typeMap = { hook: 'hook', talking_head: 'head', transformation: 'trans' };
  grid.innerHTML = filtered.map(r => {
    const t = typeMap[r.type] || 'hook';
    const steps = r.script.map(s => `<div class="script-step"><div class="script-time">${s.time}</div><div class="script-text">${s.text}</div></div>`).join('');
    const tags = r.tags.map(t => `<span class="reel-tag">${t}</span>`).join('');
    return `
    <div class="reel-card" data-type="${t}">
      <div class="reel-preview" style="background:${r.bg}">
        <div class="reel-number">Reel #${r.id}</div>
        <div class="reel-type-tag ${typeCss[t]}">${typeLabels[t]}</div>
        <div class="reel-hook">${r.hook}</div>
        <div class="reel-cta">${r.cta}</div>
        <div class="reel-timer"></div>
      </div>
      <div class="reel-body">
        <div class="reel-title">${r.title}</div>
        <div style="font-size:.75rem;color:var(--gray2)">⏱ ${r.duration} · ${typeLabels[t]}</div>
        <div class="reel-script">${steps}</div>
        <div class="reel-tags">${tags}</div>
        <div class="reel-actions">
          <button class="btn btn-outline btn-sm" onclick="copyScript(${r.id})">📋 Copy Script</button>
          <button class="btn btn-ghost btn-sm" onclick="copyHashtags(${r.id})"># Hashtags</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterReels(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReels(type === 'trans' ? 'transformation' : type === 'head' ? 'talking_head' : type);
}

function copyScript(id) {
  const r = REELS.find(r => r.id === id);
  const text = `REEL #${r.id}: ${r.title}\nType: ${typeLabels[{hook:'hook',talking_head:'head',transformation:'trans'}[r.type]]}\nHook: "${r.hook}"\nDuration: ${r.duration}\n\nSCRIPT:\n` + r.script.map(s => `[${s.time}] ${s.text.replace(/<[^>]+>/g,'')}`).join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('✅ Script copied!'));
}

function copyHashtags(id) {
  const r = REELS.find(r => r.id === id);
  navigator.clipboard.writeText(r.tags.join(' ')).then(() => showToast('✅ Hashtags copied!'));
}

// HOOKS BANK
function renderHooks() {
  document.getElementById('hooks-grid').innerHTML = HOOKS.map(h => `
    <div class="hook-chip" onclick="copyHook('${h.replace(/'/g,"\\'")}')">
      "${h}"
    </div>
  `).join('');
}

function copyHook(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✅ Hook copied!'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

renderReels('all');
renderHooks();
</script>
</body>
</html>
